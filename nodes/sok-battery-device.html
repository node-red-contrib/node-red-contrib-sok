<script type="text/javascript">
  RED.nodes.registerType('sok-battery-device', {
    category: 'config',
    defaults: {
      name: { value: '' },
      bluetooth: { value: 'auto' },
      namePrefix: { value: 'SK' },
      address: { value: '' },
      debug: { value: false }
    },
    label: function () {
      return this.name || this.address || this.namePrefix || 'SOK battery';
    }
  });
</script>

<script type="text/html" data-template-name="sok-battery-device">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name">
  </div>
  <div class="form-row">
    <label for="node-config-input-bluetooth"><i class="fa fa-bluetooth"></i> Bluetooth</label>
    <select id="node-config-input-bluetooth">
      <option value="auto">auto</option>
      <option value="bluez">bluez</option>
      <option value="noble">noble</option>
    </select>
  </div>
  <div class="form-row">
    <label for="node-config-input-namePrefix"><i class="fa fa-bluetooth"></i> Name prefix</label>
    <input type="text" id="node-config-input-namePrefix" placeholder="SK">
  </div>
  <div class="form-row">
    <label for="node-config-input-address"><i class="fa fa-map-marker"></i> Address</label>
    <input type="text" id="node-config-input-address" placeholder="optional BLE address">
  </div>
  <div class="form-row">
    <label for="node-config-input-debug"><i class="fa fa-bug"></i> Debug</label>
    <input type="checkbox" id="node-config-input-debug" style="display:inline-block;width:auto;vertical-align:top;">
  </div>
</script>

<script type="text/html" data-help-name="sok-battery-device">
  <p>Configures a SOK smart battery BLE target. Use <code>bluez</code> on Linux devices where noble is not available without extra privileges.</p>
</script>
